---
- hosts: all
  become: yes
  vars:
    server_name: localhost
    document_root: /var/www
    app_root: html_demo_site-main
    zip_source: html_demo.zip
  
  tasks:
    - name: Update apt cache and install Nginx
      apt:
        name:
          - nginx
          - unzip
        state: present
        update_cache: yes

    - name: Create document root
      file:
        path: "{{ document_root }}"
        state: directory
        owner: www-data
        group: www-data
        mode: '0755'

    - name: Extract website files to the document root
      unarchive:
        src: "{{ zip_source }}"
        dest: "{{ document_root }}"
        remote_src: no
        owner: www-data
        group: www-data
        mode: '0755'

    - name: Apply Nginx template
      template:
        src: files/nginx.conf.j2
        dest: /etc/nginx/sites-available/default
      notify: Restart Nginx

    - name: Ensure symbolic link exists for Nginx site
      file:
        src: /etc/nginx/sites-available/default
        dest: /etc/nginx/sites-enabled/default
        state: link
      notify: Restart Nginx

  handlers:
    - name: Restart Nginx
      service:
        name: nginx
        state: restarted
